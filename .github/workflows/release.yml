name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build skills
        run: ./install.sh build

      - name: Validate generated workflow skills
        run: |
          test -f skills/using-codepatrol/SKILL.md
          test -f skills/cp-review/SKILL.md
          test -f skills/cp-review/architecture-reviewer.md
          test -f skills/cp-review/codestyle-reviewer.md
          test -f skills/cp-review/security-reviewer.md
          test -f skills/cp-review/testing-reviewer.md
          test -f skills/cp-fix/SKILL.md
          test -f skills/cp-fix/fix-agent-prompt.md

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "codepatrol-${VERSION}.tar.gz" \
            skills/ templates/ platforms/ .claude-plugin/ \
            install.sh LICENSE README.md README.ru.md CLAUDE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: codepatrol-*.tar.gz
