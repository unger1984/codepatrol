name: Validate Release Assets

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin skills
        run: ./install.sh build

      - name: Validate generated structure
        run: |
          test -d skills
          test -f skills/using-codepatrol/SKILL.md
          test -f skills/cp-review/SKILL.md
          test -f skills/cp-review/architecture-reviewer.md
          test -f skills/cp-review/codestyle-reviewer.md
          test -f skills/cp-review/security-reviewer.md
          test -f skills/cp-review/testing-reviewer.md
          test -f skills/cp-fix/SKILL.md
          test -f skills/cp-fix/fix-agent-prompt.md

      - name: Reject legacy generated structure
        run: |
          if find skills -maxdepth 1 -type d \( -name 'code-review' -o -name 'code-review-fix' -o -name 'cpatrol' -o -name 'cpresume' -o -name 'cpexecute' -o -name 'cpplanreview' -o -name 'cpplanfix' -o -name 'cpreview' -o -name 'cpfix' -o -name 'cpdocs' -o -name 'cprules' -o -name 'cp-idea' -o -name 'cp-plan' -o -name 'cp-execute' -o -name 'cp-plan-review' -o -name 'cp-plan-fix' -o -name 'cp-resume' -o -name 'cp-docs' -o -name 'cp-rules' \) | grep -q .; then
            echo 'Found legacy generated skill directories.'
            find skills -maxdepth 1 -type d
            exit 1
          fi

      - name: Validate placeholders are fully substituted
        run: |
          if grep -R -nE '\{\{[A-Z0-9_]+\}\}' skills; then
            echo 'Found unsubstituted placeholders in generated skills.'
            exit 1
          fi
