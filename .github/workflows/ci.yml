name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild skills from templates
        run: ./install.sh build

      - name: Check skills/ is up to date
        run: |
          if ! git diff --quiet skills/; then
            echo "::error::skills/ is out of date. Run './install.sh build' and commit the result."
            git diff skills/
            exit 1
          fi

      - name: Validate generated workflow skills
        run: |
          test -f skills/cpatrol/SKILL.md
          test -f skills/cpresume/SKILL.md
          test -f skills/cpexecute/SKILL.md
          test -f skills/cpplanreview/SKILL.md
          test -f skills/cpplanfix/SKILL.md
          test -f skills/cpreview/SKILL.md
          test -f skills/cpreview/architecture-reviewer.md
          test -f skills/cpreview/codestyle-reviewer.md
          test -f skills/cpreview/security-reviewer.md
          test -f skills/cpreview/testing-reviewer.md
          test -f skills/cpfix/SKILL.md
          test -f skills/cpfix/fix-agent-prompt.md
          test -f skills/cpdocs/SKILL.md
          test -f skills/cprules/SKILL.md

      - name: Reject legacy skill names
        run: |
          if find skills -maxdepth 1 -type d \( -name 'code-review' -o -name 'code-review-fix' \) | grep -q .; then
            echo "::error::Legacy skill directories are still present."
            find skills -maxdepth 1 -type d
            exit 1
          fi
