name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild skills from templates
        run: ./install.sh build

      - name: Check skills/ is up to date
        run: |
          if ! git diff --quiet skills/; then
            echo "::error::skills/ is out of date. Run './install.sh build' and commit the result."
            git diff skills/
            exit 1
          fi

      - name: Validate generated workflow skills
        run: |
          test -f skills/using-codepatrol/SKILL.md
          test -f skills/cp-docs/SKILL.md
          test -f skills/cp-review/SKILL.md
          test -f skills/cp-review/architecture-reviewer.md
          test -f skills/cp-review/codestyle-reviewer.md
          test -f skills/cp-review/security-reviewer.md
          test -f skills/cp-review/testing-reviewer.md
          test -f skills/cp-fix/SKILL.md
          test -f skills/cp-fix/fix-agent-prompt.md

      - name: Reject legacy skill names
        run: |
          if find skills -maxdepth 1 -type d \( -name 'code-review' -o -name 'code-review-fix' -o -name 'cpatrol' -o -name 'cpresume' -o -name 'cpexecute' -o -name 'cpplanreview' -o -name 'cpplanfix' -o -name 'cpreview' -o -name 'cpfix' -o -name 'cpdocs' -o -name 'cprules' -o -name 'cp-idea' -o -name 'cp-plan' -o -name 'cp-execute' -o -name 'cp-plan-review' -o -name 'cp-plan-fix' -o -name 'cp-resume' \) | grep -q .; then
            echo "::error::Legacy skill directories are still present."
            find skills -maxdepth 1 -type d
            exit 1
          fi
